<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PerpsTrader // News Heatmap</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="/js/universal-nav.js"></script>
  <link rel="stylesheet" href="/css/terminal-unified.css">
  <style>
    /* Aliases to bridge page-specific var names → unified theme */
    :root {
      --bg-panel-hover: rgba(255,255,255,0.04);
      --border-subtle: var(--border-low);
      --border-medium: var(--border-med);
      --border-strong: var(--border-high);
      --text-body: rgba(255,255,255,0.5);
      --text-label: rgba(255,255,255,0.3);
      --mono: var(--font-mono);
      --sans: var(--font-sans);
    }

    .app {
      width: 100%;
      margin: 16px auto;
      padding: 0 16px;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 150ms ease;
    }

    .panel:hover {
      border-color: var(--border-medium);
    }

    .header {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title-wrap {
      display: grid;
      gap: 4px;
    }

    .title-wrap h1 {
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      text-transform: none;
    }

    .title-wrap p {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-meta);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      border: 1px solid var(--border-subtle);
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--text-meta);
      background: var(--bg-panel);
      font-size: 0.7rem;
      font-family: var(--mono);
      white-space: nowrap;
    }

    .chip strong {
      color: var(--text-primary);
      margin-left: 4px;
    }

    .chip.ok strong { color: var(--good); }
    .chip.warn strong { color: var(--warn); }
    .chip.bad strong { color: var(--bad); }

    .controls {
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .group {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      border: 1px solid var(--border-subtle);
      padding: 6px 8px;
      border-radius: 8px;
      background: var(--bg-panel);
    }

    .group-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-meta);
      margin-right: 2px;
    }

    .btn,
    select,
    input {
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      background: var(--bg-panel);
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 5px 9px;
      outline: none;
      transition: border-color 150ms ease;
    }

    .btn {
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .btn:hover {
      border-color: var(--border-medium);
    }

    .btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(59,130,246,0.08);
    }

    .btn.primary {
      border-color: rgba(74,222,128,0.4);
      color: var(--good);
      background: rgba(74,222,128,0.06);
    }

    input { min-width: 200px; }

    .timeline-wrap {
      padding: 10px 16px 14px;
    }

    .timeline-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-meta);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .timeline-canvas {
      width: 100%;
      height: 150px;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      background: var(--bg-panel);
    }

    .stats-grid {
      padding: 0 16px 14px;
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
    }

    .stat {
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--bg-panel);
    }

    .stat-label {
      font-family: var(--mono);
      color: var(--text-meta);
      font-size: 0.65rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      grid-auto-rows: 160px;
      gap: 12px;
      padding: 14px 16px 18px;
    }

    .empty {
      border: 1px dashed var(--border-subtle);
      border-radius: 8px;
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-meta);
      font-family: var(--mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .card {
      border: 1px solid var(--border-subtle);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 10px;
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 150ms ease;
    }

    .card:hover {
      border-color: var(--border-medium);
      border-left-color: var(--accent);
    }

    .card-head,
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .card-head { color: var(--text-meta); }

    .category {
      color: var(--accent);
      font-weight: 700;
    }

    .badge {
      border: 1px solid var(--border-subtle);
      border-radius: 999px;
      padding: 2px 7px;
      color: var(--text-meta);
      background: var(--bg-panel);
    }

    .badge.critical { border-color: rgba(248,113,113,0.5); color: var(--bad); }
    .badge.high { border-color: rgba(245,158,11,0.5); color: var(--warn); }
    .badge.medium { border-color: rgba(59,130,246,0.5); color: var(--accent); }
    .badge.low { border-color: var(--border-subtle); }

    .topic {
      font-weight: 700;
      line-height: 1.3;
      font-size: 0.95rem;
      color: var(--text-primary);
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      overflow: hidden;
    }

    .card-meta { color: var(--text-meta); }

    .trend-up { color: var(--good); }
    .trend-down { color: var(--bad); }
    .trend-flat { color: var(--text-meta); }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(700px, 96vw);
      height: 100vh;
      transform: translateX(100%);
      transition: transform 0.2s ease;
      background: #000;
      border-left: 1px solid var(--border-subtle);
      z-index: 10000;
      display: flex;
      flex-direction: column;
    }

    .drawer.open { transform: translateX(0); }

    .drawer-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .drawer-title {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.35;
      color: var(--text-primary);
    }

    .drawer-sub {
      margin-top: 6px;
      font-family: var(--mono);
      color: var(--text-meta);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .drawer-body {
      padding: 14px 16px 22px;
      overflow-y: auto;
      display: grid;
      gap: 14px;
    }

    .article {
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 10px;
      background: var(--bg-panel);
      display: grid;
      gap: 6px;
    }

    .article a {
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 600;
    }

    .article a:hover { color: var(--accent); }

    .article-meta {
      color: var(--text-meta);
      font-family: var(--mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    @media (max-width: 1024px) {
      .stats-grid {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        grid-auto-rows: 145px;
      }
      input { min-width: 140px; }
    }
  </style>
</head>
<body class="unified-theme page-news-heatmap">
  <div class="app">
    <section class="panel">
      <div class="header">
        <div class="title-wrap">
          <h1>LLM News Heatmap Engine</h1>
          <p>Collection + Clustering + Heat Scoring</p>
        </div>
        <div class="chip-row">
          <div class="chip" id="llmStatus">LLM <strong>Unknown</strong></div>
          <div class="chip" id="dataStatus">Data <strong>Loading</strong></div>
          <div class="chip" id="updateStatus">Updated <strong>--</strong></div>
        </div>
      </div>

      <div class="controls">
        <div class="group">
          <span class="group-label">Window</span>
          <button class="btn active" data-hours="24">24H</button>
          <button class="btn" data-hours="48">48H</button>
          <button class="btn" data-hours="12">12H</button>
          <button class="btn" data-hours="6">6H</button>
          <button class="btn" data-hours="1">1H</button>
        </div>

        <div class="group">
          <span class="group-label">Category</span>
          <select id="categoryFilter">
            <option value="ALL">ALL</option>
            <option value="CRYPTO">CRYPTO</option>
            <option value="STOCKS">STOCKS</option>
            <option value="ECONOMICS">ECONOMICS</option>
            <option value="GEOPOLITICS">GEOPOLITICS</option>
            <option value="TECH">TECH</option>
            <option value="COMMODITIES">COMMODITIES</option>
          </select>
        </div>

        <div class="group">
          <span class="group-label">Sort</span>
          <select id="sortFilter">
            <option value="heat">Heat</option>
            <option value="velocity">Velocity</option>
            <option value="articles">Articles</option>
            <option value="freshness">Freshness</option>
          </select>
        </div>

        <div class="group">
          <span class="group-label">Search</span>
          <input id="searchInput" type="text" placeholder="topic / keyword">
        </div>

        <div class="group">
          <button class="btn primary" id="rebuildBtn">Rebuild (LLM)</button>
          <button class="btn" id="refreshBtn">Refresh</button>
        </div>
      </div>

      <div class="timeline-wrap">
        <div class="timeline-head">
          <span>Heat Timeline</span>
          <span id="timelineRange">Last 24h</span>
        </div>
        <canvas id="timelineCanvas" class="timeline-canvas" width="1200" height="150"></canvas>
      </div>

      <div class="stats-grid">
        <div class="stat">
          <div class="stat-label">Collected Articles</div>
          <div class="stat-value" id="statArticles">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Visible Clusters</div>
          <div class="stat-value" id="statClusters">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">LLM Coverage</div>
          <div class="stat-value" id="statCoverage">0%</div>
        </div>
        <div class="stat">
          <div class="stat-label">Hottest Cluster</div>
          <div class="stat-value" id="statMaxHeat">0</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="grid" id="heatmapGrid">
        <div class="empty">Loading clustered heatmap...</div>
      </div>
    </section>
  </div>

  <aside class="drawer" id="detailDrawer">
    <div class="drawer-head">
      <div>
        <h2 class="drawer-title" id="drawerTitle">Cluster</h2>
        <div class="drawer-sub" id="drawerMeta">-</div>
      </div>
      <button class="btn" id="closeDrawerBtn">Close</button>
    </div>
    <div class="drawer-body">
      <div id="drawerSummary"></div>
      <div id="drawerArticles"></div>
    </div>
  </aside>

  <script src="/js/news-heatmap.js"></script>
</body>
</html>
