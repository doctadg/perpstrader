<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERPS_TRADER // EVENT_HEATMAP</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/js/universal-nav.js"></script>
    <link rel="stylesheet" href="/css/mobile-responsive.css">
    <link rel="stylesheet" href="/css/mobile-native.css">
    <script src="/js/mobile-enhancements.js"></script>
    <script src="/js/mobile-native.js"></script>
    <link rel="stylesheet" href="/css/terminal-unified.css">
    <style>
        /* Page-specific layout for heatmap */
        body.unified-theme.page-heatmap {
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            height: 48px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-subtle);
            backdrop-filter: blur(12px);
            z-index: 100;
            flex-shrink: 0;
        }

        .system-id {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.05em;
            color: var(--text-meta);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .system-id::before {
            content: "";
            width: 6px;
            height: 6px;
            background: var(--warn);
            border-radius: 50%;
        }

        .nav-links { display: flex; gap: 16px; }

        .nav-link {
            color: var(--text-meta);
            text-decoration: none;
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 500;
            transition: color 150ms ease;
        }

        .nav-link:hover,
        .nav-link.active { color: var(--text-primary); }

        .controls {
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-meta);
            padding: 4px 10px;
            font-family: var(--mono);
            font-size: 11px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 150ms ease;
        }

        .filter-btn:hover {
            border-color: var(--border-medium);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: rgba(255,255,255,0.04);
            border-color: var(--border-medium);
            color: var(--text-primary);
        }

        .heatmap-container {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            grid-auto-rows: 220px;
            gap: 16px;
            grid-auto-flow: dense;
        }

        .heat-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 14px;
            position: relative;
            overflow: hidden;
            transition: border-color 150ms ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .heat-card:hover {
            border-color: var(--border-medium);
        }

        .heat-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            bottom: 0;
            background: var(--card-color, #444);
        }

        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .category-badge {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .urgency-badge {
            font-family: var(--mono);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .urgency-critical { background: rgba(248,113,113,0.1); color: var(--bad); border: 1px solid rgba(248,113,113,0.2); }
        .urgency-high { background: rgba(245,158,11,0.1); color: var(--warn); border: 1px solid rgba(245,158,11,0.2); }
        .urgency-medium { background: rgba(59,130,246,0.1); color: var(--accent); border: 1px solid rgba(59,130,246,0.2); }
        .urgency-low { background: rgba(255,255,255,0.02); color: var(--text-meta); border: 1px solid var(--border-subtle); }

        .card-topic {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-metrics {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .metric {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-meta);
            background: rgba(255,255,255,0.02);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-subtle);
        }

        .trend-arrow { font-size: 14px; font-weight: bold; margin-left: 6px; }
        .trend-up { color: var(--good); }
        .trend-down { color: var(--bad); }
        .trend-neutral { color: var(--text-meta); }

        /* Category Colors */
        .cat-crypto { --card-color: #f7931a; }
        .cat-stocks { --card-color: #00ceff; }
        .cat-economics { --card-color: #4caf50; }
        .cat-geopolitics { --card-color: #f87171; }
        .cat-tech { --card-color: #9c27b0; }
        .cat-commodities { --card-color: #ff9800; }
        .cat-sports { --card-color: #e91e63; }
        .cat-football { --card-color: #2196f3; }
        .cat-basketball { --card-color: #ff5722; }
        .cat-mma { --card-color: #795548; }
        .cat-tennis { --card-color: #00bcd4; }
        .cat-golf { --card-color: #8bc34a; }
        .cat-general { --card-color: #666; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .cluster-modal {
            width: 80vw;
            max-width: 900px;
            max-height: 85vh;
            background: #000;
            border: 1px solid var(--border-medium);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
        }

        .article-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
        }

        .article-item {
            padding: 10px 12px;
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            border-left: 3px solid var(--border-medium);
            transition: border-color 150ms ease;
        }

        .article-item:hover { border-color: var(--border-medium); }

        .article-title {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 13px;
            text-decoration: none;
            display: block;
            margin-bottom: 4px;
        }

        .article-title:hover { color: var(--accent); }

        .article-meta {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-meta);
        }

        .loading {
            font-family: var(--mono);
            color: var(--text-meta);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>

<body class="unified-theme page-heatmap">
    <!-- Swipe Navigation Hint -->
    <div class="swipe-hint show-mobile">
        <span class="swipe-hint-icon left">‹</span>
        <span style="font-size: 0.7em; color: var(--text-meta);">SWIPE</span>
        <span class="swipe-hint-icon right">›</span>
    </div>

    <div class="top-bar">
        <div class="system-id">OBSIDIAN_HEATMAP // V.1.0</div>
        <div class="nav-links hide-mobile">
            <a href="/news" class="nav-link">FEED</a>
            <a href="/heatmap" class="nav-link active">HEATMAP</a>
            <a href="/trace" class="nav-link">TRACE</a>
        </div>
        <div class="system-id" id="clock">00:00 UTC</div>
    </div>

    <div class="controls">
        <button class="filter-btn active" onclick="setHours(24, this)">24H</button>
        <button class="filter-btn" onclick="setHours(12, this)">12H</button>
        <button class="filter-btn" onclick="setHours(6, this)">6H</button>
        <button class="filter-btn" onclick="setHours(1, this)">1H</button>
    </div>

    <div class="heatmap-container" id="heatmapGrid">
        <div class="loading">INITIALIZING VISUAL MATRIX...</div>
    </div>

    <!-- Cluster Detail Modal -->
    <div class="modal-overlay" id="clusterModal" onclick="closeModal(event)">
        <div class="cluster-modal">
            <div class="modal-header">
                <div>
                    <div
                        style="font-family: var(--mono); font-size: 10px; color: var(--text-meta); margin-bottom: 4px;">
                        EVENT_CLUSTER</div>
                    <h2 style="color: #fff; font-size: 1.5em;" id="modalTopic">Topic</h2>
                </div>
                <button onclick="closeModal()"
                    style="background:none; border:none; color: #666; font-size: 1.5em; cursor: pointer;">&times;</button>
            </div>
            <div class="modal-body">
                <div style="color: #ccc; margin-bottom: 25px; line-height: 1.6;" id="modalSummary"></div>

                <h3 style="font-family: var(--font-mono); font-size: 0.8em; color: #888; text-transform: uppercase;">
                    Related Coverage</h3>
                <div class="article-list" id="modalArticles"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentHours = 24;

        function updateClock() {
            document.getElementById('clock').textContent = new Date().toISOString().slice(11, 19) + ' UTC';
        }
        setInterval(updateClock, 1000); updateClock();

        function setHours(h, btn) {
            currentHours = h;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            fetchHeatmap();
        }

        function getCategoryClass(cat) {
            return 'cat-' + (cat || 'general').toLowerCase();
        }

        async function fetchHeatmap() {
            try {
                const res = await fetch(`${API_BASE}/news/clusters?hours=${currentHours}&limit=50`);
                const clusters = await res.json();
                renderHeatmap(clusters);
            } catch (e) {
                console.error('Heatmap fetch failed:', e);
            }
        }

        function renderHeatmap(clusters) {
            const grid = document.getElementById('heatmapGrid');
            grid.innerHTML = '';

            if (clusters.length === 0) {
                grid.innerHTML = '<div class="loading">NO SIGNIFICANT EVENTS DETECTED IN TIMEFRAME</div>';
                return;
            }

            const counts = clusters.map(c => Number(c.articleCount) || 0).filter(n => n > 0);
            const minCount = counts.length ? Math.min(...counts) : 1;
            const maxCount = counts.length ? Math.max(...counts) : 1;
            const heats = clusters.map(c => Number(c.heatScore) || 0);
            const minHeat = heats.length ? Math.min(...heats) : 0;
            const maxHeat = heats.length ? Math.max(...heats) : 0;

            function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }
            function normalize(n, lo, hi) {
                if (!Number.isFinite(n)) return 0;
                if (hi <= lo) return 0;
                return (n - lo) / (hi - lo);
            }

            function getTrendArrow(direction) {
                if (direction === 'UP') return '<span class="trend-arrow trend-up">↑</span>';
                if (direction === 'DOWN') return '<span class="trend-arrow trend-down">↓</span>';
                return '<span class="trend-arrow trend-neutral">-</span>';
            }

            function getUrgencyClass(urgency) {
                return `urgency-${urgency?.toLowerCase() || 'medium'}`;
            }

            clusters.forEach(c => {
                const card = document.createElement('div');
                card.className = `heat-card ${getCategoryClass(c.category)}`;

                const count = Number(c.articleCount) || 0;
                const heat = Number(c.heatScore) || 0;

                const logCount = Math.log10(Math.max(1, count));
                const logMin = Math.log10(Math.max(1, minCount));
                const logMax = Math.log10(Math.max(1, maxCount));
                const countNorm = normalize(logCount, logMin, logMax);
                const heatNorm = normalize(heat, minHeat, maxHeat);

                const weight = clamp(countNorm * 0.85 + heatNorm * 0.15, 0, 1);
                const span = 1 + Math.round(weight * 3);
                card.style.gridColumnEnd = `span ${span}`;
                card.style.gridRowEnd = `span ${span}`;

                const trendArrow = getTrendArrow(c.trendDirection);
                const urgencyClass = getUrgencyClass(c.urgency);

                card.innerHTML = `
                    <div class="card-header-row">
                        <span class="category-badge">${c.category}</span>
                        <span class="urgency-badge ${urgencyClass}">${c.urgency || 'MEDIUM'}</span>
                    </div>
                    <div class="card-topic">${c.topic} ${trendArrow}</div>
                    <div class="card-metrics">
                        <span class="metric">${c.articleCount} MENTIONS</span>
                        <span class="metric">HEAT ${c.heatScore.toFixed(0)}</span>
                        <span class="metric">${c.trendDirection || 'NEUTRAL'}</span>
                    </div>
                `;
                card.onclick = () => openCluster(c.id);
                grid.appendChild(card);
            });
        }

        async function openCluster(id) {
            const modal = document.getElementById('clusterModal');
            modal.classList.add('active');

            // Fetch details
            const res = await fetch(`${API_BASE}/news/clusters/${id}`);
            const data = await res.json();

            document.getElementById('modalTopic').textContent = data.topic;
            const articleCount = data.articles?.length || 0;
            const heatScore = data.heatScore || 0;
            const summaryText = data.summary || (articleCount > 0
                ? `${articleCount} articles about "${data.topic}". Heat score: ${heatScore.toFixed(1)}.`
                : 'No details available for this cluster.');
            document.getElementById('modalSummary').textContent = summaryText;

            const list = document.getElementById('modalArticles');
            if (!data.articles || data.articles.length === 0) {
                list.innerHTML = '<div class="article-item" style="color: #666;">No articles found for this cluster</div>';
            } else {
                list.innerHTML = data.articles.map(a => `
                    <div class="article-item">
                        <a href="${a.url}" target="_blank" class="article-title">${a.title}</a>
                        <div class="article-meta">
                            ${a.source || 'Unknown'} // ${a.publishedAt ? new Date(a.publishedAt).toLocaleString() : 'No date'}
                        </div>
                    </div>
                `).join('');
            }
        }

        function closeModal(e) {
            if (e && e.target !== document.getElementById('clusterModal')) return;
            document.getElementById('clusterModal').classList.remove('active');
        }

        // Initial load
        fetchHeatmap();

        // Socket listener for live updates
        const socket = io();
        socket.on('cluster_update', () => {
            console.log('Cluster update received, refreshing...');
            fetchHeatmap();
        });

    </script>
    <!-- Conversational Agent Widget -->
</body>

</html>
